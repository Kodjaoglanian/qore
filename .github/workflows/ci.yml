name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type Check & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --no-progress

      - name: Type check
        run: bun run tsc

      - name: Run tests
        run: bun test

  build-smoke:
    name: Build Smoke Test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --no-progress

      - name: Patch ink devtools
        run: bash scripts/prebuild.sh

      - name: Build binary
        run: bun build src/index.tsx --compile --target bun-linux-x64 --outfile qore

      - name: Smoke test — binary starts
        run: |
          chmod +x qore
          timeout 3 ./qore --help || true
          test -f qore && echo "Binary exists and is executable"
