name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: node ./node_modules/typescript/bin/tsc --noEmit

      - name: Run tests
        run: bun test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: qore-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: qore-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: qore-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            asset: qore-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            asset: qore-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Patch ink devtools
        run: bash scripts/prebuild.sh
        if: runner.os != 'Windows'

      - name: Patch ink devtools (Windows)
        shell: bash
        run: bash scripts/prebuild.sh
        if: runner.os == 'Windows'

      - name: Build binary
        run: bun build src/index.tsx --compile --target ${{ matrix.target }} --outfile qore

      - name: Rename binary
        shell: bash
        run: |
          mv qore ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make install script executable
        run: chmod +x scripts/install.sh

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" --no-merges)
          fi

          {
            echo "BODY<<EOF"
            echo "## Install"
            echo ""
            echo "### Linux / macOS"
            echo ""
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/Kodjaoglanian/qore/releases/latest/download/install.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "### Windows (PowerShell)"
            echo ""
            echo "\`\`\`powershell"
            echo "irm https://github.com/Kodjaoglanian/qore/releases/latest/download/install.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "### Manual download"
            echo ""
            echo "| Platform | Asset |"
            echo "|----------|-------|"
            echo "| Linux x64 | \`qore-linux-x64\` |"
            echo "| Linux arm64 | \`qore-linux-arm64\` |"
            echo "| macOS arm64 (Apple Silicon) | \`qore-darwin-arm64\` |"
            echo "| macOS x64 (Intel) | \`qore-darwin-x64\` |"
            echo "| Windows x64 | \`qore-windows-x64.exe\` |"
            echo ""
            echo "Or update an existing install with:"
            echo ""
            echo "\`\`\`bash"
            echo "qore update"
            echo "\`\`\`"
            echo ""

            FEATS=$(echo "$COMMITS" | grep -iE "^feat" || true)
            FIXES=$(echo "$COMMITS" | grep -iE "^fix" || true)
            DOCS=$(echo "$COMMITS" | grep -iE "^docs" || true)
            REFACTORS=$(echo "$COMMITS" | grep -iE "^refactor" || true)
            TESTS=$(echo "$COMMITS" | grep -iE "^test" || true)
            CHORES=$(echo "$COMMITS" | grep -iE "^chore|^ci" || true)
            OTHER=$(echo "$COMMITS" | grep -viE "^(feat|fix|docs|refactor|test|chore|ci)" || true)

            if [ -n "$FEATS" ]; then
              echo "### New Features"
              echo "$FEATS" | sed 's/feat(\([^)]*\)):/**\1**:/; s/^feat:/**feature**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/fix(\([^)]*\)):/**\1**:/; s/^fix:/**fix**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "### Refactoring"
              echo "$REFACTORS" | sed 's/refactor(\([^)]*\)):/**\1**:/; s/^refactor:/**refactor**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS" | sed 's/docs(\([^)]*\)):/**\1**:/; s/^docs:/**docs**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$TESTS" ]; then
              echo "### Tests"
              echo "$TESTS" | sed 's/test(\([^)]*\)):/**\1**:/; s/^test:/**test**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES" | sed 's/chore(\([^)]*\)):/**\1**:/; s/^chore:/**chore**:/; s/^ci(\([^)]*\)):/**ci:\1**:/; s/^ci:/**ci**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER" | sed 's/^/- /'
              echo ""
            fi

            echo "---"
            echo "**Full changelog:** https://github.com/Kodjaoglanian/qore/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${GITHUB_REF_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Qore ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          files: |
            artifacts/qore-linux-x64
            artifacts/qore-linux-arm64
            artifacts/qore-darwin-arm64
            artifacts/qore-darwin-x64
            artifacts/qore-windows-x64.exe
            scripts/install.sh
            scripts/install.ps1
