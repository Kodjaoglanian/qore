name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: node ./node_modules/typescript/bin/tsc --noEmit

      - name: Run tests
        run: bun test

      - name: Patch ink devtools (remove react-devtools-core dependency)
        run: bash scripts/prebuild.sh

      - name: Build binary
        run: bun build src/index.tsx --compile --outfile qore

      - name: Rename binary with platform suffix
        run: mv qore qore-linux-x64

      - name: Make binary executable
        run: chmod +x qore-linux-x64

      - name: Make install script executable
        run: chmod +x scripts/install.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" --no-merges)
          fi

          {
            echo "BODY<<EOF"
            echo "## Install"
            echo ""
            echo "```bash"
            echo "curl -fsSL https://github.com/Kodjaoglanian/qore/releases/latest/download/install.sh | bash"
            echo "```"
            echo ""

            FEATS=$(echo "$COMMITS" | grep -iE "^feat" || true)
            FIXES=$(echo "$COMMITS" | grep -iE "^fix" || true)
            DOCS=$(echo "$COMMITS" | grep -iE "^docs" || true)
            REFACTORS=$(echo "$COMMITS" | grep -iE "^refactor" || true)
            TESTS=$(echo "$COMMITS" | grep -iE "^test" || true)
            CHORES=$(echo "$COMMITS" | grep -iE "^chore|^ci" || true)
            OTHER=$(echo "$COMMITS" | grep -viE "^(feat|fix|docs|refactor|test|chore|ci)" || true)

            if [ -n "$FEATS" ]; then
              echo "### New Features"
              echo "$FEATS" | sed 's/feat(\([^)]*\)):/**\1**:/; s/^feat:/**feature**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/fix(\([^)]*\)):/**\1**:/; s/^fix:/**fix**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "### Refactoring"
              echo "$REFACTORS" | sed 's/refactor(\([^)]*\)):/**\1**:/; s/^refactor:/**refactor**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS" | sed 's/docs(\([^)]*\)):/**\1**:/; s/^docs:/**docs**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$TESTS" ]; then
              echo "### Tests"
              echo "$TESTS" | sed 's/test(\([^)]*\)):/**\1**:/; s/^test:/**test**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES" | sed 's/chore(\([^)]*\)):/**\1**:/; s/^chore:/**chore**:/; s/^ci(\([^)]*\)):/**ci:\1**:/; s/^ci:/**ci**:/; s/^/- /'
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER" | sed 's/^/- /'
              echo ""
            fi

            echo "---"
            echo "**Full changelog:** https://github.com/Kodjaoglanian/qore/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${GITHUB_REF_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Qore ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          files: |
            qore-linux-x64
            scripts/install.sh
