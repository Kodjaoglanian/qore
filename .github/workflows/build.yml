name: Build

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: qore-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: qore-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: qore-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            asset: qore-windows-x64.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Disable Windows Defender scanning (speed up I/O)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.bun"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --no-progress

      - name: Patch ink (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/prebuild.sh

      - name: Patch ink (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Inline patch for Windows — avoid sed -i.bak on Git Bash (slow)
          INK_DEVTOOLS="node_modules/ink/build/devtools.js"
          INK_APP="node_modules/ink/build/components/App.js"
          if [ -f "$INK_DEVTOOLS" ]; then
            printf '// Patched by CI — devtools disabled\nconst connectToDevtools = () => {};\nexport default connectToDevtools;\n' > "$INK_DEVTOOLS"
          fi
          if [ -f "$INK_APP" ]; then
            node -e "
              const fs=require('fs');
              let s=fs.readFileSync('$INK_APP','utf8');
              s=s.replace(/return this\.props\.stdin\.isTTY;/g,'return true;');
              s=s.replace(/stdin\.ref\(\);/g,'if (typeof stdin.ref === \"function\") stdin.ref();');
              s=s.replace(/stdin\.unref\(\);/g,'if (typeof stdin.unref === \"function\") stdin.unref();');
              fs.writeFileSync('$INK_APP',s);
            "
          fi
          echo "Patched ink for Windows build"

          # Remove ssh2 native crypto binding and cpu-features (force JS fallback)
          rm -f "node_modules/ssh2/lib/protocol/crypto/build/Release/sshcrypto.node"
          rm -rf "node_modules/cpu-features"
          echo "Removed ssh2 native binding + cpu-features (JS fallback)"

          # Patch ssh2 WASM init to resolve on failure + remove chacha20-poly1305 cipher
          node -e "
            const fs=require('fs');
            const cryptoFile='node_modules/ssh2/lib/protocol/crypto.js';
            let s=fs.readFileSync(cryptoFile,'utf8');
            s=s.replace(/return reject\(ex\);/g,'return resolve();');
            fs.writeFileSync(cryptoFile,s);
            const constFile='node_modules/ssh2/lib/protocol/constants.js';
            let c=fs.readFileSync(constFile,'utf8');
            c=c.replace(/chacha20-poly1305@openssh\.com/g,\"'aes256-ctr'\");
            fs.writeFileSync(constFile,c);
          "
          echo "Patched ssh2 WASM init + removed chacha20-poly1305 cipher"

      - name: Build binary
        run: bun build src/index.tsx --compile --target ${{ matrix.target }} --outfile qore

      - name: Rename binary
        shell: bash
        run: |
          mv qore ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Smoke test — binary exists and runs
        if: runner.os != 'Windows'
        shell: bash
        run: |
          timeout 3 ./${{ matrix.asset }} --help || true
          file ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 14
